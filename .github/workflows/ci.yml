name: CI

on:
  push:
    branches: [main, NIH_commons]
  pull_request:

jobs:
  pytest:
    name: Unit tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
        # Both installable packages in the monorepo: the importer/downloader
        # (gacdi, repo root) and the manifest builder (gacdi-manifest).
        package: [".", "cli_tools/gacdi_manifest"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install sibling gacdi (the builder depends on it)
        if: ${{ matrix.package == 'cli_tools/gacdi_manifest' }}
        working-directory: ${{ github.workspace }}
        run: python -m pip install -e .
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q -m "not network"

  planemo-lint:
    name: Lint Galaxy tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install planemo
        run: python -m pip install planemo
      - name: Lint
        run: planemo lint --skip citations tools/gdc tools/geo tools/sra tools/cda tools/xena tools/manifest_gdc

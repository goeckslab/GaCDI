name: CI

on:
  push:
    branches: [main, NIH_commons]
  pull_request:

jobs:
  pytest:
    name: Unit tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        # Both installable packages in the monorepo: the importer/downloader
        # (gacdi, repo root) and the manifest builder (gacdi-manifest).
        package: [".", "cli_tools/gacdi_manifest"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install sibling gacdi (the builder depends on it)
        if: ${{ matrix.package == 'cli_tools/gacdi_manifest' }}
        working-directory: ${{ github.workspace }}
        run: python -m pip install -e .
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q -m "not network"

  integration:
    name: Cross-tool integration (builder -> downloader handoff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install both distributions together
        run: |
          python -m pip install -e '.[dev]'
          python -m pip install -e 'cli_tools/gacdi_manifest[dev]'
      - name: Run the cross-tool selection-bundle integration suite
        run: pytest -q integration_tests

  wheels:
    name: Build wheels and smoke-test the CLIs from a clean environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build both wheels
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist_wheels .
          python -m build --wheel --outdir dist_wheels cli_tools/gacdi_manifest
      - name: Install the wheels into a clean venv and smoke-test the CLIs
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install dist_wheels/gacdi-*.whl dist_wheels/gacdi_manifest-*.whl
          /tmp/smoke/bin/gacdi --version
          /tmp/smoke/bin/gacdi-manifest --version
          /tmp/smoke/bin/gacdi gdc --help > /dev/null
          /tmp/smoke/bin/gacdi-manifest gdc --help > /dev/null

  planemo-lint:
    name: Lint Galaxy tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install planemo
        run: python -m pip install planemo==0.75.44
      - name: Lint
        run: >-
          planemo lint
          tools/gdc tools/geo tools/sra tools/cda tools/xena
          tools/manifest_gdc tools/manifest_pdc tools/manifest_idc
      - name: Lint Tool Shed metadata
        run: planemo shed_lint --skip version_bumped --fail_level error .

name: CI

on:
  push:
    branches: [main, NIH_commons]
  pull_request:

jobs:
  pytest:
    name: Unit tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        # The installable packages in the monorepo: the shared foundation
        # (gacdi-core), the importer/downloader (gacdi), and the manifest
        # builder (gacdi-manifest).
        package:
          ["packages/gacdi_core", "packages/gacdi_downloader", "packages/gacdi_manifest_builder"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the shared foundation (both tools depend on it)
        if: ${{ matrix.package != 'packages/gacdi_core' }}
        working-directory: ${{ github.workspace }}
        run: python -m pip install -e packages/gacdi_core
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q -m "not network"

  integration:
    name: Cross-tool integration (builder -> downloader handoff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install all three distributions together
        run: |
          python -m pip install -e packages/gacdi_core
          python -m pip install -e 'packages/gacdi_downloader[dev]'
          python -m pip install -e 'packages/gacdi_manifest_builder[dev]'
      - name: Run the cross-tool selection-bundle integration suite
        run: pytest -q integration_tests

  wheels:
    name: Build wheels and smoke-test the CLIs from a clean environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build all three wheels
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist_wheels packages/gacdi_core
          python -m build --wheel --outdir dist_wheels packages/gacdi_downloader
          python -m build --wheel --outdir dist_wheels packages/gacdi_manifest_builder
      - name: Smoke-test each tool wheel without the sibling tool installed
        run: |
          python -m venv /tmp/smoke-downloader
          /tmp/smoke-downloader/bin/python -m pip install \
            dist_wheels/gacdi_core-*.whl \
            dist_wheels/gacdi-*.whl
          /tmp/smoke-downloader/bin/gacdi --version
          /tmp/smoke-downloader/bin/gacdi-downloader gdc --help > /dev/null

          python -m venv /tmp/smoke-builder
          /tmp/smoke-builder/bin/python -m pip install \
            dist_wheels/gacdi_core-*.whl \
            dist_wheels/gacdi_manifest-*.whl
          /tmp/smoke-builder/bin/gacdi-manifest --version
          /tmp/smoke-builder/bin/gacdi-manifest-builder gdc --help > /dev/null

  planemo-lint:
    name: Lint Galaxy tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install planemo
        run: python -m pip install planemo==0.75.44
      - name: Lint
        run: >-
          planemo lint
          tools/gdc tools/geo tools/sra tools/cda tools/xena
          tools/manifest_gdc tools/manifest_pdc tools/manifest_idc
      - name: Lint Tool Shed metadata
        run: planemo shed_lint --skip version_bumped --fail_level error .

name: CI

on:
  push:
    branches: [main, manifest_tool]
  pull_request:

jobs:
  pytest:
    name: Unit tests (gacdi_manifest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli_tools/gacdi_manifest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q -m "not network"

  planemo-lint:
    name: Lint Galaxy tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install planemo
        run: python -m pip install planemo
      - name: Lint
        run: planemo lint --skip citations tools/manifest_gdc

name: Build and push containers

# Builds the shared base image, the per-importer images, and the manifest-builder
# image, then pushes them to Quay on a version tag (e.g. v0.1.0). Requires
# repository secrets:
#   QUAY_USERNAME, QUAY_TOKEN  (a Quay robot account with push access)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: quay.io
  # Single namespace for the whole suite. NOTE: keep this in sync with the
  # <container> namespace in tools/manifest_gdc/macros.xml (currently a
  # placeholder) before publishing.
  ORG: paulocilasjr
  VERSION: "0.1.0"

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build & push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-base:${{ env.VERSION }}

  tools:
    needs: base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [gdc, geo, sra, cda]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build & push ${{ matrix.tool }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.${{ matrix.tool }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-base:${{ env.VERSION }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-${{ matrix.tool }}:${{ env.VERSION }}

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build & push manifest builder
        uses: docker/build-push-action@v6
        with:
          context: cli_tools/gacdi_manifest
          file: cli_tools/gacdi_manifest/Dockerfile
          push: true
          build-args: |
            GACDI_BUILD=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-manifest:${{ env.VERSION }}

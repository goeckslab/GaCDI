name: Build and push manifest container

# Builds the manifest-builder image and pushes it to Quay on a version tag
# (e.g. v0.1.0). Requires repository secrets QUAY_USERNAME and QUAY_TOKEN.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: quay.io
  # Must match the <container> namespace in tools/manifest_gdc/macros.xml.
  ORG: goeckslab
  VERSION: "0.1.0"

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: cli_tools/gacdi_manifest
          file: cli_tools/gacdi_manifest/Dockerfile
          push: true
          build-args: |
            GACDI_BUILD=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-manifest:${{ env.VERSION }}

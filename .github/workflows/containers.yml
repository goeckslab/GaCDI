name: Build and push containers

# Builds the shared base image, the per-importer images, and the manifest-builder
# image, then pushes them to Quay. The manifest image tag is taken from
# gacdi_manifest/__init__.py's __version__ (the single source of truth for
# versioning; pyproject.toml derives its version from it via hatchling) and the
# manifest build refuses to overwrite a tag that already exists on Quay, so a
# forgotten version bump fails the build instead of silently clobbering the
# published image. Runs on pushes to main that touch the packages/containers, or
# manually. Requires repository secrets QUAY_USERNAME and QUAY_TOKEN (Quay robot
# account).
on:
  push:
    branches: ["main"]
    paths:
      - "gacdi/**"
      - "cli_tools/gacdi_manifest/**"
      - "containers/**"
  workflow_dispatch:

env:
  REGISTRY: quay.io
  # Must match the <container> namespace in the tool macros (tools/macros.xml and
  # tools/manifest_gdc/macros.xml).
  ORG: goeckslab
  IMAGE: gacdi-manifest

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from gacdi/__init__.py
        id: version
        run: |
          VERSION=$(grep -m1 '^__version__' gacdi/__init__.py | sed -E 's/__version__ = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Refuse to overwrite an existing tag
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-base:${{ steps.version.outputs.version }}"
          if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists at $IMAGE_REF." >&2
            echo "Bump __version__ in gacdi/__init__.py before pushing again." >&2
            exit 1
          fi

      - name: Build & push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-base:${{ steps.version.outputs.version }}

  tools:
    needs: base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [gdc, geo, sra, cda]
    steps:
      - uses: actions/checkout@v4

      - name: Read version from gacdi/__init__.py
        id: version
        run: |
          VERSION=$(grep -m1 '^__version__' gacdi/__init__.py | sed -E 's/__version__ = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Refuse to overwrite an existing tag
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-${{ matrix.tool }}:${{ steps.version.outputs.version }}"
          if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists at $IMAGE_REF." >&2
            echo "Bump __version__ in gacdi/__init__.py before pushing again." >&2
            exit 1
          fi

      - name: Build & push ${{ matrix.tool }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.${{ matrix.tool }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-base:${{ steps.version.outputs.version }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/gacdi-${{ matrix.tool }}:${{ steps.version.outputs.version }}

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package __init__.py
        id: version
        run: |
          VERSION=$(grep -m1 '^__version__' cli_tools/gacdi_manifest/gacdi_manifest/__init__.py | sed -E 's/__version__ = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Refuse to overwrite an existing tag
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}"
          if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists at $IMAGE_REF." >&2
            echo "Bump __version__ in gacdi_manifest/__init__.py before pushing again." >&2
            exit 1
          fi

      - name: Build & push manifest builder
        uses: docker/build-push-action@v6
        with:
          context: cli_tools/gacdi_manifest
          file: cli_tools/gacdi_manifest/Dockerfile
          push: true
          build-args: |
            GACDI_BUILD=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}

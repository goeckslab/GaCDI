name: gacdi
owner: paulocilasjr
description: Galaxy Cancer Data Importers — import NIH/NCI cancer datasets into Galaxy histories.
long_description: |
  GaCDI provides Galaxy tools for importing cancer datasets from major public and
  controlled-access cancer data repositories (GDC, GEO, SRA, the Cancer Data Aggregator and
  UCSC Xena in this release) directly
  into Galaxy histories, ready for downstream analyses and workflows. Each tool shares a
  common downloader that streams files with retries and checksum verification and emits a
  dataset collection plus a provenance summary.
homepage_url: https://github.com/paulocilasjr/GaCDI
remote_repository_url: https://github.com/paulocilasjr/GaCDI
type: unrestricted
categories:
  - Data Source
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "{{ tool_name }}: {{ tool_description }}"
suite:
  name: suite_gacdi
  description: Galaxy Cancer Data Importers (GDC, GEO, SRA, CDA, Xena)
  long_description: |
    A suite of Galaxy tools for importing datasets from NIH/NCI cancer data repositories
    into Galaxy histories.
